@if (mainAreaGrid().root | wbGridElementIfVisible; as root) {
  <wb-grid-element [element]="root"
                   wbViewDropZone
                   [wbViewDropZoneSize]="100"
                   [wbViewDropZonePlaceholderSize]="100"
                   [wbViewDropZoneRegions]="{
                     north: false,
                     south: root | wbRequiresDropZone:'south',
                     west: root | wbRequiresDropZone:'west',
                     east: root | wbRequiresDropZone:'east',
                     center: false,
                   }"
                   [wbViewDropZoneCssClass]="'e2e-main-area-grid'"
                   (wbViewDropZoneDrop)="onViewDrop($event)"/>
} @else if (part.navigation()) {
  <sci-viewport class="content">
    <!-- TODO [activity] Consider using a portal similar to view (like desktop) to not lose data when moving the part  -->
    <!-- TODO [activity] Do we need drop zones? Maybe configurable; not in activities  -->
    <router-outlet [name]="part.id" wbRouterOutletRootContext/>
  </sci-viewport>
} @else {
  <!-- TODO [activity] Backward compatibility -> deprecate -->
  <sci-viewport class="start-page"
                wbViewDropZone
                [wbViewDropZoneSize]="1"
                [wbViewDropZoneRegions]="{center: true, north: false, south: false, west: false, east: false}"
                [wbViewDropZoneCssClass]="'e2e-main-area-grid'"
                (wbViewDropZoneDrop)="onViewDrop($event)">
    <router-outlet (activate)="onStartPageActivate()"/>
  </sci-viewport>
}
