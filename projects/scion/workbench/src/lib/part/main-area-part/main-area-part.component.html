@if (mainAreaGrid().root.visible) {
  <wb-grid [grid]="mainAreaGrid()"
           [gridDropZone]="{
             dropRegionSize: 100,
             dropPlaceholderSize: 100,
             dropZoneAttributes: {
               'data-grid': 'main-area',
               'data-partid': part.id,
             }
           }"
           [attr.data-grid]="'main-area'"
           class="e2e-content"/>
} @else {
  <sci-viewport class="desktop e2e-part-content e2e-content e2e-desktop"
                wbViewDropZone
                [wbViewDropZoneRegions]="canDrop() && {center: true, north: false, south: false, west: false, east: false}"
                [wbViewDropZoneAttributes]="{
                  'data-desktop': '',
                  'data-partid': part.id,
                }"
                (wbViewDropZoneDrop)="onDesktopViewDrop($event)"
                #desktop_element>
    @if (part.navigation()) {
      <!-- TODO [dwie] Change to part slot analog to part.component -->
      <!-- TODO [dwie] Change PartPo bounding box from .e2e-part-content to div.e2e-part-content -->
      <router-outlet [name]="part.id" wbRouterOutletRootContext/>
    } @else if (desktop()) {
      <ng-container *ngTemplateOutlet="desktop()!"/>
    } @else {
      <router-outlet (activate)="onLegacyStartPageActivate()"/>
    }
  </sci-viewport>
}
