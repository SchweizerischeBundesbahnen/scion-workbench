<!-- Title -->
@if (part.title()) {
  <span class="title e2e-title" (mousedown)="onPartBarMouseDown($event)">{{(part.title() | sciText)()}}</span>
}

<!-- View Tabs -->
@if (part.views().length) {
  <wb-view-tab-bar [maxWidth]="maxViewTabBarWidth()"/>
}

<sci-toolbar name="toolbar:workbench.part.tabbar" [context]="toolbarActiveViewContext()" [acceleratorTarget]="part.portal.element()"/>
<div class="filler e2e-filler" #filler (mousedown)="onPartBarMouseDown($event)"></div>
<sci-toolbar name="toolbar:workbench.part.toolbar" [context]="toolbarActiveViewContext()" [acceleratorTarget]="part.portal.element()"/>
