<!-- Title -->
@if (part.title()) {
  <span class="title e2e-title" (mousedown)="onPartBarMouseDown($event)">{{(part.title() | sciText)()}}</span>
}

<!-- View Tabs -->
@if (part.views().length) {
  <wb-view-tab-bar [maxWidth]="maxViewTabBarWidth()"/>
}

<sci-toolbar name="toolbar:workbench.part.secondary" [context]="toolbarActiveViewContext()" [acceleratorTarget]="part.portal.element()"/>

<!-- Filler -->
<div class="filler e2e-filler" #filler (mousedown)="onPartBarMouseDown($event)"></div>

<sci-toolbar name="toolbar:workbench.part" [context]="toolbarActiveViewContext()" [acceleratorTarget]="part.portal.element()"/>
<sci-toolbar name="toolbar:workbench.part.internal" [context]="toolbarActiveViewContext()" [acceleratorTarget]="part.portal.element()"/>

<!-- Minimize Button -->
<!--TODO [menu] Implement as toolbar item? -->
@if (part.canMinimize()) {
  <button (click)="onMinimize()" [title]="('%scion.workbench.minimize.tooltip' | sciText)()" class="minimize e2e-minimize">
    <wb-icon icon="workbench.minimize"/>
  </button>
}
