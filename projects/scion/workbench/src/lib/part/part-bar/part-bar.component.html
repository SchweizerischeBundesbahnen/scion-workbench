<!-- Title -->
@if (part.title()) {
  <span class="title e2e-title" (mousedown)="onPartBarMouseDown($event)">{{(part.title() | sciText)()}}</span>
}

<!-- View Tabs -->
@if (part.views().length) {
  <wb-view-tab-bar [maxWidth]="maxViewTabBarWidth()"/>
}

<!-- .tabbar suffix is suboptimal since also used in parts without view tabs. Find better suffix, e.g., actionbar -->
<sci-toolbar name="toolbar:workbench.part.tabbar"
             [context]="toolbarActiveViewContext()"
             [acceleratorTarget]="part.portal.element()"
             (mousedown)="onToolbarMouseDown()"
             wbToolbarVisibility/>

<div class="filler e2e-filler" #filler (mousedown)="onPartBarMouseDown($event)"></div>

<sci-toolbar name="toolbar:workbench.part.toolbar"
             [context]="toolbarActiveViewContext()"
             [acceleratorTarget]="part.portal.element()"
             (mousedown)="onToolbarMouseDown()"
             wbToolbarVisibility/>
