@if (isDevMode && view) {
  @let hint = '%scion.workbench.null_view_developer_hint.message;view=' + (view.alternativeId ?? view.id) | sciText;
  @let tooltip = '%scion.workbench.dev_mode_only_hint.tooltip' | sciText;
  <section class="developer-hint" [title]="tooltip()" [innerHTML]="hint()"></section>
} @else {
  {{('%scion.workbench.null_content.message' | sciText)()}}
}
