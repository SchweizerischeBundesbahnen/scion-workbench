<ng-template wbDialogHeader [divider]="false">
  <wb-message-box-header [title]="options()?.title" [severity]="options()?.severity ?? 'info'"/>
</ng-template>

@let messageContent = message();
<div class="message e2e-message" [class.text]="messageContent | wbTypeof:'string'" sciDimension (sciDimensionChange)="onContentDimensionChange($event)">
  @if (messageContent| wbTypeof:'string') {
    {{messageContent}}
  } @else {
    <ng-container *ngComponentOutlet="messageContent; inputs: options()?.inputs"/>
  }
</div>

<ng-template wbDialogFooter>
  <wb-message-box-footer [actions]="options()?.actions ?? {ok: 'OK'}"
                         [severity]="options()?.severity ?? 'info'"
                         (action)="onAction($event)"
                         (keydown.escape)="onEscape()"
                         (preferredSizeChange)="onFooterPreferredSizeChange($event)"/>
</ng-template>
