@for (menu of menus(); track $index) {
  <button [class.active]="activeMenu()?.menu === menu"
          [class]="menu.cssClass"
          (mousedown)="onMenuMouseDown(menu)"
          (click)="onMenuClick(menu, element)"
          (mouseenter)="onMenuMouseEnter(menu, element)"
          (mouseleave)="onMenuMouseLeave(menu)"
          #element>
    {{menu.labelText!()}}
  </button>
}
