@for (menuItem of menuItems(); track $index) {
  @let disabled = this.disabled() || menuItem.disabled?.() || false;

  @switch (menuItem.type) {
    @case ('menu-item') {
      <button [attr.disabled]="disabled || null"
              [class.checked]="menuItem.checked?.()"
              [class]="menuItem.cssClass" class="menu-item"
              (click)="onSelect(menuItem)">
        @if (menuItem.icon?.()) {
          <span class="icon material-symbols-rounded" translate="no">{{menuItem.icon?.()}}</span>
        }
        @if (menuItem.labelText) {
          <span class="label">{{menuItem.labelText()}}</span>
        } @else if (menuItem.labelComponent) {
          <span class="label">
            <ng-container *ngComponentOutlet="menuItem.labelComponent"/>
          </span>
        }
      </button>
    }
    @case ('menu') {
      @let hasLabel = menuItem.labelText || menuItem.labelComponent;
      <button [attr.disabled]="disabled || null"
              [class.active]="activeSubMenuItem()?.menu === menuItem"
              [class.visual-menu-hint]="menuItem.icon?.() && !hasLabel && menuItem.visualMenuHint"
              [class]="menuItem.cssClass" class="menu-item submenu-item"
              (click)="onSubMenuClick({menu: menuItem, element: element})"
              #element>
        @if (menuItem.icon) {
          <span class="icon material-symbols-rounded" translate="no">{{menuItem.icon()}}</span>
        }

        @if (menuItem.labelText) {
          <span class="label">{{menuItem.labelText()}}</span>
        } @else if (menuItem.labelComponent) {
          <span class="label">
            <ng-container *ngComponentOutlet="menuItem.labelComponent"/>
          </span>
        }

        <!-- Add chevron for label menus -->
        @if (hasLabel && menuItem.visualMenuHint) {
          <span class="material-symbols-rounded" translate="no">keyboard_arrow_down</span>
        }
      </button>
    }
    @case ('group') {
      <sci-toolbar-group [menuItems]="menuItem.children"
                         [disabled]="disabled"
                         [viewContainerRef]="viewContainerRef()"
                         (menuOpen)="onChildGroupMenuOpen($event)"
                         [class]="menuItem.cssClass"/>
    }
  }
}
