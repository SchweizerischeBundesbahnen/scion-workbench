<wb-workbench>
  @switch (desktop()) {
    @case ('desktop-page') {
      <ng-template wbDesktop>
        <app-desktop-page/>
      </ng-template>
    }
    @case ('focus-page') {
      <ng-template wbDesktop>
        <app-focus-test-page/>
      </ng-template>
    }
    @case ('layout-page') {
      <ng-template wbDesktop>
        <app-layout-page/>
      </ng-template>
    }
    @default {
      <ng-template wbDesktop>
        <app-start-page/>
      </ng-template>
    }
  }
</wb-workbench>
