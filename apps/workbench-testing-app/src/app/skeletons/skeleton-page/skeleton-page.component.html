@if (view.part.isInMainArea) {
  <form>
    <app-input-field-skeleton/>
    <app-input-field-skeleton/>
    <app-input-field-skeleton/>
    <app-input-field-skeleton/>
    <app-input-field-skeleton/>
    <app-input-field-skeleton/>
  </form>

  <app-tabbar-skeleton [tabs]="tabs" [selectedTab]="selectedTab" (selectedTabChange)="onTabSelect($event)"/>
}

@switch (selectedTab) {
  @case ('table') {
    <section class="tab table">
      <app-table-skeleton/>
      <section class="detail">
        <app-chart-skeleton/>
        <app-chart-skeleton/>
        <app-chart-skeleton/>
      </section>
    </section>
  }
  @case ('form') {
    <section class="tab form">
      <sci-viewport>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
        <app-input-field-skeleton/>
      </sci-viewport>
    </section>
  }
  @case ('list') {
    <section class="tab list">
      <app-list-skeleton/>
    </section>
  }
}

<button sciMaterialIcon class="reload" (click)="onReload()">autorenew</button>
