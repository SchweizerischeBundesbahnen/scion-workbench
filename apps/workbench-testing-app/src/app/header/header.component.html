<!-- Perspective Switcher -->
@let activePerspective = workbenchService.activePerspective()!;
<button (click)="onPerspectiveSwitcherMenuOpen(perspective_switcher_menu_button)"
        title="Switch Perspective"
        class="e2e-perspective-switcher-menu-button perspective-switcher menu-button" [class.open]="perspectiveSwitcherMenuOpen()"
        #perspective_switcher_menu_button>
  {{activePerspective.data[PerspectiveData.label] ?? activePerspective.id}}
  <span sciMaterialIcon>keyboard_arrow_down</span>
</button>

<div class="filler"></div>

<!-- Theme Switcher -->
<div class="theme-switcher">
  <button (click)="onActivateDarkTheme()" class="menu-button">
    <span sciMaterialIcon>dark_mode</span>
  </button>
  <sci-toggle-button [formControl]="lightThemeActiveFormControl" class="e2e-color-scheme"/>
  <button (click)="onActivateLightTheme()" class="menu-button">
    <span sciMaterialIcon>light_mode</span>
  </button>
</div>

<!-- Settings Menu -->
<button (click)="onSettingsMenuOpen(settings_menu_button)"
        class="e2e-settings-menu-button settings menu-button" [class.open]="settingsMenuOpen()"
        #settings_menu_button>
  <span sciMaterialIcon>more_vert</span>
</button>
